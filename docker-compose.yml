# AgentGuard control plane (dashboard). Config comes entirely from .env at runtime —
# copy .env.example to .env and fill it in. Without a .env the dashboard boots in
# keyless demo mode (the in-browser demo, no backend) so you can look around first.
services:
  dashboard:
    image: ghcr.io/merveealpay/agentguard-dashboard:latest
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
